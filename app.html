<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Nusantara - Sistem ERP modern untuk manajemen bisnis">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Nusantara - ERP Dashboard</title>
  
  <!-- PWA & Icons -->
  <link rel="icon" type="image/png" href="/logo-nusantara-sq.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Theme Initialization -->
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('erp_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Styles -->
  <!-- NOTE: keep mobile.css after style.css and WITHOUT a media attribute.
       Vite bundles plain stylesheet links into main-*.css in document order,
       but a link with `media=` is emitted separately at its original position
       — which lands BEFORE the injected main-*.css bundle, so desktop rules
       in style.css would override the mobile overrides in production. -->
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/mobile.css">
</head>
<body>
  <!-- Skip to main content link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ============================================
       LOGIN SCREEN
       ============================================ -->
  <div id="login-screen" style="display: none; position: fixed; inset: 0; z-index: 50; overflow: auto;">
    <button class="theme-toggle" id="login-theme-toggle" aria-label="Toggle theme" style="position: absolute; top: 20px; right: 20px; z-index: 2;">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px;">
      <div style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 32px;">
          <div style="width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 16px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(37,99,235,0.4);">
            <img src="/logo-nusantara-sq.png" alt="Nusantara" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
          <h1 style="font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px;">Nusantara</h1>
          <p style="font-size: 14px; color: var(--muted);">Sign in to continue</p>
        </div>
        
        <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: var(--shadow-lg);">
          <form id="login-form">
            <div style="margin-bottom: 20px;">
              <label for="login-email" style="display: block; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px;">Email</label>
              <input type="email" id="login-email" required autocomplete="email" style="width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--surface); color: var(--text);">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label for="login-password" style="display: block; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px;">Password</label>
              <div style="position: relative;">
                <input type="password" id="login-password" required autocomplete="current-password" style="width: 100%; padding: 12px; padding-right: 44px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--surface); color: var(--text);">
                <button type="button" id="login-toggle-pw" tabindex="-1" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-secondary); font-size: 18px; line-height: 1;" title="Tampilkan password">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            
            <div id="login-error" style="display: none; padding: 12px; background: var(--danger-bg); border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); font-size: 13px; margin-bottom: 16px;"></div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 15px;">
              Sign In
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================
       MAIN APPLICATION
       ============================================ -->
  <div id="app-container" style="display: none;">
    
    <!-- Sidebar Navigation (iPadOS-style) -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <img src="/logo-nusantara-sq.png" alt="Nusantara">
        </div>
        <span class="sidebar-brand">Nusantara ERP</span>
      </div>

      <nav class="sidebar-rail" id="nav">
        <div class="nav-section">
          <div class="nav-section-label">Overview</div>
          <button class="rail-item active" data-menu="dashboard" title="Dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span class="nav-label">Dashboard</span>
          </button>
        </div>

        <div class="nav-section">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span class="nav-label">General Ledger</span>
          </button>

            <span class="nav-label">Cash & Bank</span>

          <button class="rail-item" data-menu="assets" title="Fixed Assets">

            <span class="nav-label">SmartLink Tax</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Operations</div>
          <button class="rail-item" data-menu="sales" title="Sales">

            <span class="nav-label">Sales</span>
          </button>
          <button class="rail-item" data-menu="purchases" title="Purchases">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="nav-label">Purchases</span>
          </button>
          <button class="rail-item" data-menu="inventory" title="Inventory">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            <span class="nav-label">Inventory</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Analytics</div>
          <button class="rail-item" data-menu="reports" title="Reports">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="nav-label">Reports</span>
          </button>
        </div>
      </nav>

      <div style="padding: 8px 10px; border-top: 1px solid rgba(255,255,255,0.05);">
        <button class="rail-item" data-menu="company" title="Company">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="nav-label">Settings</span>
        </button>
      </div>
      <div class="user-bar">
        <div class="avatar-sm" id="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">User</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
    </aside>

    <!-- Contextual sub-nav panel (second tier; docked on desktop, overlay on mobile) -->
    <div class="flyout-panel" id="flyout-panel">
      <div class="flyout-header">
        <h3 class="flyout-title" id="flyout-title">Menu</h3>
        <button class="subnav-collapse" id="subnav-collapse" type="button" title="Sembunyikan menu" aria-label="Sembunyikan menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="flyout-separator" id="flyout-separator"></div>
      </div>
      <div class="flyout-grid" id="flyout-grid">

      </div>
    </div>
    <div class="flyout-backdrop" id="flyout-backdrop"></div>

    <!-- Mobile Backdrop -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main Content -->
    <main class="main">
      
      <!-- Top Bar -->
      <header class="topbar" role="banner">
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <div class="search-wrap" id="search-wrap" role="search">
          <input class="search-input" id="search-input" type="search" placeholder="Cari transaksi, laporan…" aria-label="Search">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>

        <div class="topbar-right">
          <!-- Firebase connection indicator -->
          <button class="db-status-chip" id="db-status-chip" aria-label="Status koneksi database" title="Memuat...">
            <span class="db-status-dot" id="db-status-dot"></span>
            <span class="db-status-label" id="db-status-label">…</span>
          </button>

          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>

          <button class="notif" id="notif-btn" aria-label="Notifications" style="position:relative">

              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notif-dot" style="display:none;position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;background:#EF4444;color:#fff;border-radius:8px;font-size:10px;font-weight:700;align-items:center;justify-content:center;line-height:16px;"></span>
          </button>

          <button class="user-chip" id="user-menu-btn" aria-label="User menu">

          <!-- Mobile overflow button (hidden on desktop) -->

              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

      <!-- Content Area -->
      <div class="content" id="main-content" role="main">
        
        <!-- Views -->

       ============================================ -->

  <!-- ============================================
       SCRIPTS
       ============================================ -->
  <script type="module" src="/src/main.js"></script>

  <!-- Hamburger Menu Toggle (mobile sidebar drawer) -->
  <script>
    (function() {
      const hamburger = document.getElementById('hamburger');
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      if (!hamburger || !sidebar || !backdrop) return;

      function isMobile() {
        return window.innerWidth <= 768;
      }

      function openSidebar() {
        sidebar.classList.add('open');
        backdrop.classList.add('open');
        hamburger.classList.add('open');
        hamburger.setAttribute('aria-expanded', 'true');
        document.body.classList.add('sidebar-open');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('sidebar-open');
      }

      // Force-close sidebar on mobile (in case main.js opens it)
      if (isMobile()) {
        closeSidebar();
      }

      // Also observe sidebar for class changes (main.js might add 'open')
      var sidebarObserver = new MutationObserver(function(mutations) {
        if (isMobile() && sidebar.classList.contains('open') && !hamburger.classList.contains('open')) {
          // Sidebar was opened by external JS, sync the UI
          backdrop.classList.add('open');
          hamburger.classList.add('open');
          hamburger.setAttribute('aria-expanded', 'true');
          document.body.classList.add('sidebar-open');
        }
      });
      sidebarObserver.observe(sidebar, { attributes: true, attributeFilter: ['class'] });

      // Toggle on hamburger click
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        if (sidebar.classList.contains('open')) {
          closeSidebar();
        } else {
          openSidebar();
        }
      });

      // Close on backdrop click
      backdrop.addEventListener('click', closeSidebar);

      // Close on nav item click (mobile)
      sidebar.querySelectorAll('.rail-item').forEach(function(item) {
        item.addEventListener('click', function() {
          if (isMobile()) {
            closeSidebar();
          }
        });
      });

      // Close on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sidebar.classList.contains('open')) {
          closeSidebar();
        }
      });

      // Close on swipe left on sidebar
      let touchStartX = 0;
      sidebar.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });
      sidebar.addEventListener('touchend', function(e) {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (diff > 60 && sidebar.classList.contains('open')) {
          closeSidebar();
        }
      }, { passive: true });

      // Handle resize
      window.addEventListener('resize', function() {
        if (!isMobile() && sidebar.classList.contains('open')) {
          closeSidebar();
        }
        // Re-ensure sidebar is hidden on mobile
        if (isMobile() && !sidebar.classList.contains('open')) {
          backdrop.classList.remove('open');
          hamburger.classList.remove('open');
          document.body.classList.remove('sidebar-open');
        }
      });
    })();
  </script>

  <!-- Topbar Overflow Menu (mobile) -->
  <script>
    (function() {
      const overflowBtn = document.getElementById('topbar-overflow');
      const overflowMenu = document.getElementById('topbar-overflow-menu');
      if (!overflowBtn || !overflowMenu) return;

      // Re-parent to <body>: the topbar's backdrop-filter makes it the
      // containing block for position:fixed, so the mobile bottom-sheet rules
      // would anchor to the topbar and push the menu above the viewport.
      document.body.appendChild(overflowMenu);

      // Toggle overflow menu
      overflowBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = overflowMenu.classList.toggle('open');
        overflowBtn.setAttribute('aria-expanded', isOpen);
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!overflowMenu.contains(e.target) && !overflowBtn.contains(e.target)) {
          overflowMenu.classList.remove('open');
          overflowBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Close on scroll
      document.querySelector('.content')?.addEventListener('scroll', function() {
        overflowMenu.classList.remove('open');
        overflowBtn.setAttribute('aria-expanded', 'false');
      });

      // Wire overflow menu buttons to their desktop counterparts
      document.getElementById('overflow-theme-toggle')?.addEventListener('click', function() {
        document.getElementById('theme-toggle')?.click();
        overflowMenu.classList.remove('open');
        overflowBtn.setAttribute('aria-expanded', 'false');
      });

      document.getElementById('overflow-notif-btn')?.addEventListener('click', function() {
        document.getElementById('notif-btn')?.click();
        overflowMenu.classList.remove('open');
        overflowBtn.setAttribute('aria-expanded', 'false');
      });

      document.getElementById('overflow-user-btn')?.addEventListener('click', function() {
        document.getElementById('user-menu-btn')?.click();
        overflowMenu.classList.remove('open');
        overflowBtn.setAttribute('aria-expanded', 'false');
      });

      // Sync overflow menu username/avatar with topbar
      function syncOverflowUser() {
        const topbarName = document.getElementById('topbar-username')?.textContent;
        // innerHTML (not textContent): the avatar may contain a profile <img>
        const topbarAvatar = document.getElementById('topbar-avatar')?.innerHTML;
        const overflowName = document.getElementById('overflow-username');
        const overflowAvatar = document.getElementById('overflow-avatar');
        if (overflowName && topbarName) overflowName.textContent = topbarName;
        if (overflowAvatar && topbarAvatar) overflowAvatar.innerHTML = topbarAvatar;
      }

      // Observe changes to topbar user info
      const topbarUsername = document.getElementById('topbar-username');
      if (topbarUsername) {
        new MutationObserver(syncOverflowUser).observe(topbarUsername, { childList: true, characterData: true, subtree: true });
      }

      // Initial sync
      syncOverflowUser();
    })();
  </script>
</body>
